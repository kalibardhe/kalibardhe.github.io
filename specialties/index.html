<!DOCTYPE html>
<html>
    <head>
        <title>
            Portuguese Specialties
        </title>
        <link rel="stylesheet" href="./resources/css/style.css" type="text/css">
    </head>
    <header>
        <h1>Sweet and Salty</h1>
    </header>
    <body>
        <main>
          <div class="product">  
            <h2 id="pasteis">Pastéis de Belém</h2>
            <img src="resources/images/pastel_de_belem_caixa.jpg" alt="Portuguese egg custard tart next to a box">
          </div>

          <div class="product">
            <h2 id="ovos">Ovos Moles de Aveiro</h2>
            <img src="resources/images/ovos_moles.jpg" alt="Portuguese sweet eggs from Aveiro">
          </div>

          <div class="product">
            <h2 id="bras">Bacalhau à Brás</h2>
            <img src="resources/images/bacalhau-a-bras.jpg" alt="Portuguese brás codfish dish">
          </div>

          <div class="product">
            <h2 id="gambas">Açorda de gambas</h2>
            <img src="resources/images/acorda_de_gambas.jpg" alt="Portuguese açorda with shrimps">
          </div>
          <div id="bg">
            <figure>
              <img src="resources/images/azulejo.jpg" alt="blue and white portuguese tiles">
            </figure>
          </div>
        </main>
    </body>
</html>
